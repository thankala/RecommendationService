services:
  # Using latest here but in production i would pin the version
  postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      POSTGRES_DB: cryptodb
      POSTGRES_USER: xm
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"

  pgadmin:
      image: dpage/pgadmin4
      container_name: pgadmin
      environment:
        PGADMIN_DEFAULT_EMAIL: admin@admin.com
        PGADMIN_DEFAULT_PASSWORD: admin
      ports:
        - "5080:80"
      depends_on:
        - postgres
  valkey:
    image: docker.io/bitnami/valkey:8.1
    container_name: valkey
    environment:
      # ALLOW_EMPTY_PASSWORD is recommended only for development.
      - ALLOW_EMPTY_PASSWORD=yes
      - VALKEY_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    ports:
      - '6379:6379'
  crypto-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recommendation-app
    ports:
      - "8080:8080"
    # volumes:
    #   - ./src/main/resources/prices:/differentpath
    # environment:
    #   - CRYPTO_PRICES_FOLDER_PATH=/differentpath
    environment:
      DB_HOST: postgres
      REDIS_HOST: valkey
    depends_on:
      - postgres