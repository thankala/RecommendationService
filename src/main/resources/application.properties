spring.application.name=RecommendationService
# Database connection
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/cryptodb
spring.datasource.username=${DB_USERNAME:xm}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# Explicitly set the dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA config
spring.jpa.hibernate.ddl-auto=update

# CSV Config
crypto.loader.folder=${CRYPTO_PRICES_FOLDER_PATH:./src/main/resources}/prices}